<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <title>Color Scheme Generator</title>
</head>
<body>
  <header>
    <h1>Bobby's Color Scheme Generator</h1>
  </header>
  <main>
    <div class="selection-section">
      <input id="color-selector" name="color-selector" type="color" value="#F55A5A">
      <select id="mode-selector" name="mode-selector"></select>
      <button id="get-color-scheme-btn">Get color scheme</button>
    </div>
    <div class="color-pallet-container"></div>
    <p id="click-to-copy">Click color to copy</p>
  </main>
  <footer>
      <p>Built with ❤️ by @BobbyBuildr</p>
      <ul class="social-links">
          <li><a href="https://github.com/bobbybuildr" target="_blank"><img src="icons/github-icon-white.png" alt="GitHub"></a></li>
          <li><a href="https://x.com/BobbyBuildr" target="_blank"><img src="icons/x-icon-white.png" alt="X (Twitter)"></a></li>
          <li><a href="https://discord.com/users/1465337090421297192" target="_blank"><img src="icons/discord-icon-white.png" alt="Discord"></a></li>
      </ul>
  </footer>
  <script src="script.js"></script>
</body>
</html>
